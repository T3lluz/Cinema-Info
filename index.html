<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#c41e2a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Buen kino – program, tider og solgte billetter" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <title>Cinema Info · Buen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="top-row">
        <div>
          <h1>Cinema Info</h1>
          <p class="subtitle">Buen kino</p>
        </div>
        <button id="refreshBtn" class="icon-btn" type="button" aria-label="Oppdater">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.1A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35Z"
            />
          </svg>
        </button>
      </div>

      <div id="dayTabs" class="day-tabs" role="tablist" aria-label="Velg dag"></div>

      <div class="screen-row">
        <label class="screen-field">
          <span>Sal</span>
          <select id="screenSelect" aria-label="Filtrer sal">
            <option value="all">Alle saler</option>
          </select>
        </label>
        <p id="statusText" class="status">—</p>
      </div>

      <section id="summary" class="summary" hidden></section>
    </header>

    <main id="content" class="content" aria-live="polite">
      <div class="state loading">
        <div class="spinner" aria-hidden="true"></div>
        <p>Henter program…</p>
      </div>
    </main>

    <footer class="footer">
      <span>Sluttid + solgt fra eBillett</span>
      <a href="https://www.buenkino.no/program?dato=alle" target="_blank" rel="noopener noreferrer"
        >buenkino.no</a
      >
    </footer>

    <script src="app.js" type="module"></script>
  </body>
</html>
